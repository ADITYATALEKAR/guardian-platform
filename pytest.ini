[pytest]
pythonpath = .
markers =
    network: requires external network targets
    slow: long-running tests
    layer0: layer0-specific validation tests
    security: security behavior and guardrail tests
    concurrency: multi-writer/locking/thread-safety tests
    migration: artifact/config migration and compatibility tests
    performance: runtime and storage performance baseline tests
addopts = -m "not network"
